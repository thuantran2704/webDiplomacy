name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Node AI runner tests ──────────────────────────────────────────────────
  node-test:
    name: Node tests (runner + orders + ratelimit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/empirica
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/empirica/package-lock.json

      - run: npm ci

      - name: Syntax check all modules
        run: |
          for f in src/*.js start.js; do node --check "$f"; done

      - name: Run unit tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results
          path: tools/empirica/research-data-test/
          if-no-files-found: ignore

  # ── PHP syntax check ──────────────────────────────────────────────────────
  php-lint:
    name: PHP syntax lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --no-progress 2>/dev/null || true

      - name: PHP syntax check (all .php files)
        run: find . -name "*.php" -not -path "*/vendor/*" -not -path "*/node_modules/*" | xargs -P4 -I{} php -l {} | grep -v "No syntax errors" || true

  # ── npm audit ─────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/empirica
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high --json > ../../audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: audit-results.json

  # ── Build + artifact ──────────────────────────────────────────────────────
  build:
    name: Build Empirica app
    runs-on: ubuntu-latest
    needs: [node-test, php-lint]
    defaults:
      run:
        working-directory: tools/empirica-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/empirica-app/package.json
      - run: npm install
      - run: npm run build 2>/dev/null || echo "No build script yet — skipping"

      - name: Upload Empirica app build
        uses: actions/upload-artifact@v4
        with:
          name: empirica-app-build
          path: tools/empirica-app/dist/
          if-no-files-found: ignore
